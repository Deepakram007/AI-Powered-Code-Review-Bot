version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: review_bot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: review_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: review_bot_app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/review_bot?schema=public
      - NODE_ENV=development
    depends_on:
      - db

volumes:
  postgres_data:
